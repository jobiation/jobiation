---
- name: Play to get the gathre facts content
  hosts: jobiation_inventory
  tasks:
  - name: print ansible_facts
    debug:
     var: ansible_facts
  - name: Copy ansible facts to a file.
    copy:
     content: "{{ ansible_facts.net_version }}"
     dest: ansible_facts_details.json

