---
- name: Play to get the gathre facts content
  hosts: jobiation_inventory
  tasks:
  # - name: print ansible_facts
  #   debug:
  #    var: ansible_facts
  - name: Gather all legacy facts
    cisco.ios.ios_facts:
      gather_subset: all
    register: ios_facts
  - name: Copy ansible facts to a file.
    copy: content="{{ ios_facts['ansible_facts']['ansible_net_interfaces']['GigabitEthernet0/0/0']['macaddress'] }}" dest="{{ inventory_hostname }}.txt"



