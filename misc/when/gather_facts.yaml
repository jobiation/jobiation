---
- name: Get_Output
  hosts: tempinventory
  gather_facts: yes
  connection: local
  vars:
    ansible_command_timeout: 30
  tasks:
  - name: Gather all legacy facts
    cisco.ios.ios_facts:
      gather_subset: all
    register: ios_facts_out
  - name: copy_output_to_file
    # copy: content="{{ ios_facts_out|json_query('ansible_facts') }}" dest="facts.json"
    copy: content="{{ ios_facts_out['ansible_facts']['ansible_net_interfaces']['GigabitEthernet0/0/0']['macaddress'] }}" dest="{{ inventory_hostname }}.txt"
    # copy: content="{{ ios_facts_out|json_query('ansible_facts.ansible_net_version') }}" dest="{{ inventory_hostname }}.txt"
  - name: 
    ios_command:
      commands:
        - config t
        - interface loopback 10
        - ip address 10.18.203.55 255.255.255.255
        - end
        - write
    when: ios_facts_out['ansible_facts']['ansible_net_interfaces']['GigabitEthernet0/0/0']['macaddress'] == "2436.daf2.dc00"

